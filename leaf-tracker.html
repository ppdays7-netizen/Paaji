<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaves Smoked Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:20px auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
}

.primary{
    background:#2e7d32;
    color:white;
}

.danger{
    background:#c62828;
    color:white;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
}

.stat{
    background:#eef7ee;
    padding:15px;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#f0f0f0;
}
</style>
</head>
<body>

<div class="card">
    <h2>🍃 Leaves Smoked Calculator & Tracker</h2>

    <label>Date</label>
    <input type="date" id="date">

    <label>Leaves Smoked Today</label>
    <input type="number" id="leaves" min="0">

    <label>Cost Per Leaf</label>
    <input type="number" id="cost" min="0" step="0.01">

    <button class="primary" onclick="saveEntry()">Save Entry</button>
    <button class="danger" onclick="clearHistory()">Clear History</button>
</div>

<div class="card">
    <h3>Statistics</h3>

    <div class="stats">
        <div class="stat">
            <strong>Total Leaves</strong>
            <div id="totalLeaves">0</div>
        </div>

        <div class="stat">
            <strong>Total Cost</strong>
            <div id="totalCost">0</div>
        </div>

        <div class="stat">
            <strong>Daily Average</strong>
            <div id="dailyAvg">0</div>
        </div>

        <div class="stat">
            <strong>Monthly Estimate</strong>
            <div id="monthlyEstimate">0</div>
        </div>

        <div class="stat">
            <strong>Yearly Estimate</strong>
            <div id="yearlyEstimate">0</div>
        </div>
    </div>
</div>

<div class="card">
    <h3>Progress Chart</h3>
    <canvas id="trackerChart"></canvas>
</div>

<div class="card">
    <h3>History</h3>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Leaves</th>
                <th>Cost/Leaf</th>
                <th>Total Cost</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>

let chart;

document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

function getData(){
    return JSON.parse(localStorage.getItem("leafTracker") || "[]");
}

function saveData(data){
    localStorage.setItem("leafTracker", JSON.stringify(data));
}

function saveEntry(){

    const date = document.getElementById("date").value;
    const leaves = Number(document.getElementById("leaves").value);
    const cost = Number(document.getElementById("cost").value);

    if(!date || leaves <= 0){
        alert("Enter a valid date and leaf count.");
        return;
    }

    const data = getData();

    data.push({
        date,
        leaves,
        cost
    });

    saveData(data);

    document.getElementById("leaves").value = "";
    updateUI();
}

function clearHistory(){

    if(confirm("Delete all saved history?")){
        localStorage.removeItem("leafTracker");
        updateUI();
    }
}

function updateUI(){

    const data = getData();

    let totalLeaves = 0;
    let totalCost = 0;

    const tbody = document.getElementById("historyBody");
    tbody.innerHTML = "";

    data.forEach(item => {

        const entryCost = item.leaves * item.cost;

        totalLeaves += item.leaves;
        totalCost += entryCost;

        tbody.innerHTML += `
            <tr>
                <td>${item.date}</td>
                <td>${item.leaves}</td>
                <td>${item.cost.toFixed(2)}</td>
                <td>${entryCost.toFixed(2)}</td>
            </tr>
        `;
    });

    const daysTracked = Math.max(data.length,1);

    const dailyAvg = totalLeaves / daysTracked;
    const monthlyEstimate = dailyAvg * 30;
    const yearlyEstimate = dailyAvg * 365;

    document.getElementById("totalLeaves").textContent =
        totalLeaves.toLocaleString();

    document.getElementById("totalCost").textContent =
        totalCost.toFixed(2);

    document.getElementById("dailyAvg").textContent =
        dailyAvg.toFixed(1);

    document.getElementById("monthlyEstimate").textContent =
        monthlyEstimate.toFixed(0);

    document.getElementById("yearlyEstimate").textContent =
        yearlyEstimate.toFixed(0);

    drawChart(data);
}

function drawChart(data){

    const labels = data.map(d => d.date);
    const values = data.map(d => d.leaves);

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("trackerChart"),
        {
            type:"line",
            data:{
                labels,
                datasets:[
                    {
                        label:"Leaves Smoked",
                        data:values,
                        borderColor:"#2e7d32",
                        backgroundColor:"rgba(46,125,50,.2)",
                        fill:true,
                        tension:0.3
                    }
                ]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{
                        display:true
                    }
                }
            }
        }
    );
}

updateUI();

</script>

</body>
</html>
